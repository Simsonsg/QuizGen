{% extends "base.html" %}
{% block title %} — Generate Quiz{% endblock %}

{% block content %}
<div class="card">
  <h1>Generate a Quiz</h1>
  <p class="subtitle">Upload a lecture PDF, PowerPoint, or text file to generate questions.</p>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form action="/generate" method="post" enctype="multipart/form-data" id="gen-form">

    <div class="form-group">
      <label for="file">Document</label>
      <input type="file" id="file" name="file" accept=".pdf,.pptx,.txt" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="strategy">Preprocessing</label>
        <select id="strategy" name="strategy">
          <option value="clean">Rule-based cleaning</option>
          <option value="summarise">LLM summarisation</option>
          <option value="raw">Raw (no cleaning)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty" name="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="form-group">
        <label for="cognitive">Cognitive level</label>
        <select id="cognitive" name="cognitive">
          <option value="recall" selected>Recall</option>
          <option value="comprehension">Comprehension</option>
          <option value="application">Application</option>
          <option value="analysis">Analysis</option>
        </select>
      </div>

      <div class="form-group">
        <label for="candidates">Candidates per chunk</label>
        <input type="number" id="candidates" name="candidates" value="3" min="1" max="6">
      </div>

      <div class="form-group">
        <label for="max_questions">Max questions</label>
        <input type="number" id="max_questions" name="max_questions" value="10" min="1" max="30">
      </div>
    </div>

    <details class="advanced">
      <summary>Advanced options</summary>
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" name="check_answerability" value="true">
          Enable answerability check (uses extra API calls)
        </label>
      </div>
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" name="check_cognitive" value="true">
          Enable cognitive-level check (uses extra API calls)
        </label>
      </div>
    </details>

    <button type="submit" class="btn btn-primary" id="submit-btn">
      Generate Quiz
    </button>
  </form>
</div>

<script>
  document.getElementById("gen-form").addEventListener("submit", function() {
    const btn = document.getElementById("submit-btn");
    btn.textContent = "Generating… this may take a moment";
    btn.disabled = true;
  });
</script>
{% endblock %}
